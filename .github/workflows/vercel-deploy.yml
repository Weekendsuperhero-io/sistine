# Optional: GitHub Actions workflow for Vercel deployment
# This is automatically handled by Vercel's Git integration
# Only use this if you need custom deployment logic

name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build main site
        run: pnpm build

      - name: Build Storybook
        run: pnpm build-storybook

